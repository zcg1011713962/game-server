version: '3.8'

services:
  redis:
    image: redis:7.2.4
    container_name: redis
    ports:
      - "6479:6379"  # 映射到主机的6379端口
    volumes:
      - D:/data/redis_data:/data  # 持久化数据
    networks:
      - app_network

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: yx168168  # 设置root密码
    ports:
      - "3406:3306"  # 映射到主机的3306端口
    volumes:
      - D:/data/mysql_data:/var/lib/mysql  # 持久化数据
    networks:
      - app_network

volumes:
  redis_data: 
  mysql_data: 

networks:
  app_network:
    driver: bridge
